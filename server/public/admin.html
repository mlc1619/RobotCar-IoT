<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RobotCar IoT &middot; Administración</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <h2 class="mb-3"><i class="bi bi-gear-fill text-primary"></i> Administración</h2>
    <div id="alerts"></div>

    <ul class="nav nav-tabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-disp">Dispositivos IoT</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-motor">Parámetros del motor</button></li>
    </ul>

    <div class="tab-content border border-top-0 p-3 bg-white">
      <!-- DISPOSITIVOS -->
      <div class="tab-pane fade show active" id="tab-disp">
        <div class="d-flex justify-content-between mb-3">
          <h5 class="mb-0">Lista de dispositivos</h5>
          <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalDisp" id="btnNuevoDisp">
            <i class="bi bi-plus-lg"></i> Nuevo
          </button>
        </div>
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead class="table-dark">
              <tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Pin</th><th>Descripción</th><th>Estado</th><th></th></tr>
            </thead>
            <tbody id="tblDisp"></tbody>
          </table>
        </div>
      </div>

      <!-- PARAMETROS -->
      <div class="tab-pane fade" id="tab-motor">
        <div class="d-flex justify-content-between mb-3">
          <h5 class="mb-0">Parámetros del motor / movimiento</h5>
          <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalParam">
            <i class="bi bi-plus-lg"></i> Nuevo parámetro
          </button>
        </div>
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead class="table-dark"><tr><th>Factor</th><th>Valor</th><th></th></tr></thead>
            <tbody id="tblParam"></tbody>
          </table>
        </div>
        <p class="text-muted small"><i class="bi bi-info-circle"></i>
          Cambia <strong>Velocidad</strong> (0-255 PWM), <strong>Factor tiempo</strong> (ms base) y los factores de giro.</p>
      </div>
    </div>
  </main>

  <!-- Modal dispositivo -->
  <div class="modal fade" id="modalDisp" tabindex="-1"><div class="modal-dialog">
    <div class="modal-content"><form id="formDisp">
      <div class="modal-header"><h5 class="modal-title">Dispositivo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="d_id">
        <div class="mb-2"><label class="form-label">Nombre *</label><input class="form-control" id="d_nombre" required></div>
        <div class="mb-2"><label class="form-label">Tipo *</label>
          <select class="form-select" id="d_tipo" required>
            <option value="carrito">carrito</option><option value="led">led</option>
            <option value="sensor">sensor</option><option value="motor">motor</option>
            <option value="buzzer">buzzer</option><option value="otro">otro</option>
          </select></div>
        <div class="mb-2"><label class="form-label">Pin GPIO</label><input class="form-control" id="d_pin" placeholder="D1, D5..."></div>
        <div class="mb-2"><label class="form-label">Descripción</label><textarea class="form-control" id="d_desc" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form></div></div></div>

  <!-- Modal parámetro -->
  <div class="modal fade" id="modalParam" tabindex="-1"><div class="modal-dialog">
    <div class="modal-content"><form id="formParam">
      <div class="modal-header"><h5 class="modal-title">Parámetro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="p_edit">
        <div class="mb-2"><label class="form-label">Factor *</label><input class="form-control" id="p_factor" required></div>
        <div class="mb-2"><label class="form-label">Valor *</label><input type="number" step="0.01" class="form-control" id="p_valor" required></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form></div></div></div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
