<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RobotCar IoT &middot; Inicio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-5">
    <div class="text-center mb-5">
      <img src="/favicon.svg" alt="" style="height:80px">
      <h1 class="display-5 fw-bold mt-3">RobotCar IoT</h1>
      <p class="lead text-muted">Plataforma de administración, control y monitoreo del dispositivo ESP8266</p>
    </div>

    <div class="row g-4">
      <div class="col-md-3">
        <a href="/admin.html" class="text-decoration-none">
          <div class="card card-device h-100 border-primary">
            <div class="card-body text-center">
              <i class="bi bi-gear-fill display-3 text-primary"></i>
              <h4 class="mt-3">Administración</h4>
              <p class="text-muted">CRUD de dispositivos IoT y motores</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="/control.html" class="text-decoration-none">
          <div class="card card-device h-100 border-success">
            <div class="card-body text-center">
              <i class="bi bi-toggles2 display-3 text-success"></i>
              <h4 class="mt-3">Control</h4>
              <p class="text-muted">Interruptores y comandos en tiempo real</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="/demos.html" class="text-decoration-none">
          <div class="card card-device h-100 border-warning">
            <div class="card-body text-center">
              <i class="bi bi-collection-play display-3 text-warning"></i>
              <h4 class="mt-3">Demos</h4>
              <p class="text-muted">Rutinas precargadas y propias</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="/monitoreo.html" class="text-decoration-none">
          <div class="card card-device h-100 border-info">
            <div class="card-body text-center">
              <i class="bi bi-graph-up display-3 text-info"></i>
              <h4 class="mt-3">Monitoreo</h4>
              <p class="text-muted">Gráfica, estatus y obstáculos</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script>Layout.render('home');</script>
</body>
</html>
