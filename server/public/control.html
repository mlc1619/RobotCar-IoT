<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RobotCar IoT &middot; Control</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <h2 class="mb-3"><i class="bi bi-toggles2 text-success"></i> Control de dispositivos</h2>
    <div id="alerts"></div>

    <div class="row g-4 mb-4" id="dispGrid"></div>

    <h4 class="mt-5"><i class="bi bi-joystick"></i> Movimientos del carrito</h4>

    <div class="row g-2" id="movGrid"></div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/control.js"></script>
</body>
</html>
