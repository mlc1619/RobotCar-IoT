<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RobotCar IoT &middot; Monitoreo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0"><i class="bi bi-graph-up text-info"></i> Monitoreo</h2>
      <span class="badge bg-info text-dark">Refresco automático: <strong>2 s</strong></span>
    </div>

    <div class="row g-3 mb-4" id="resumen"></div>

    <div class="card mb-4">
      <div class="card-header bg-dark text-white"><i class="bi bi-bar-chart-fill"></i> Estatus gráfico</div>
      <div class="card-body"><canvas id="chart" height="100"></canvas></div>
    </div>

    <!-- Obstáculos -->
    <div class="card mb-4 border-danger">
      <div class="card-header bg-danger text-white d-flex justify-content-between">
        <span><i class="bi bi-exclamation-triangle-fill"></i> Obstáculos detectados</span>
        <span id="alertaObst"></span>
      </div>
      <div class="card-body">
        <div class="row g-2 mb-3">
          <div class="col-md-3"><div class="border rounded p-2 text-center"><small class="text-muted">Total</small><div class="h4 mb-0" id="o_total">-</div></div></div>
          <div class="col-md-3"><div class="border rounded p-2 text-center"><small class="text-muted">Hoy</small><div class="h4 mb-0" id="o_hoy">-</div></div></div>
          <div class="col-md-3"><div class="border rounded p-2 text-center"><small class="text-muted">Distancia promedio</small><div class="h4 mb-0" id="o_prom">-</div></div></div>
          <div class="col-md-3"><div class="border rounded p-2 text-center"><small class="text-muted">Último</small><div class="h6 mb-0" id="o_ult">-</div></div></div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-historial mb-0">
            <thead class="table-light"><tr><th>#</th><th>Distancia (cm)</th><th>Origen</th><th>Fecha</th></tr></thead>
            <tbody id="o_tabla"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tablas"></div>

    <!-- Historial de movimientos y demos ejecutadas -->
    <div class="row g-3 mt-1">
      <div class="col-lg-6">
        <div class="card border-success h-100">
          <div class="card-header bg-success text-white d-flex justify-content-between">
            <span><i class="bi bi-arrow-repeat"></i> Últimos 10 movimientos ejecutados</span>
            <span class="badge bg-light text-success" id="h_mov_count">0</span>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-historial mb-0">
              <thead class="table-light"><tr><th>#</th><th>ID</th><th>Movimiento</th><th>Origen</th><th>ESP</th><th>Fecha</th></tr></thead>
              <tbody id="h_mov_tbl"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card border-warning h-100">
          <div class="card-header bg-warning text-dark d-flex justify-content-between">
            <span><i class="bi bi-collection-play"></i> Últimas 10 demos ejecutadas</span>
            <span class="badge bg-dark" id="h_demo_count">0</span>
          </div>
          <div class="card-body p-0">
            <div class="border-bottom p-3 bg-light">
              <div class="text-muted small">Última demo</div>
              <div id="h_demo_ultima" class="fw-bold">-</div>
            </div>
            <div class="table-responsive">
              <table class="table table-sm table-historial mb-0">
                <thead class="table-light"><tr><th>#</th><th>Demo</th><th>Pasos</th><th>Estado</th><th>Inicio</th></tr></thead>
                <tbody id="h_demo_tbl"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/monitor.js"></script>
</body>
</html>
