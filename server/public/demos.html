<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RobotCar IoT &middot; Demos</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="navbar"></div>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0"><i class="bi bi-collection-play text-warning"></i> Demos / Rutinas</h2>
      <div>
        <button class="btn btn-outline-danger me-2" id="btnCancelar"><i class="bi bi-stop-circle"></i> Cancelar demo</button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalDemo" id="btnNueva">
          <i class="bi bi-plus-lg"></i> Nueva demo
        </button>
      </div>
    </div>
    <div id="alerts"></div>

    <div class="card mb-4 border-warning">
      <div class="card-header bg-warning"><i class="bi bi-info-circle"></i> Estado de ejecución</div>
      <div class="card-body" id="estadoDemo">
        <span class="text-muted">Sin demo en ejecución.</span>
      </div>
    </div>

    <div class="row g-3" id="grid"></div>
  </main>

  <!-- Modal nueva/editar demo -->
  <div class="modal fade" id="modalDemo" tabindex="-1"><div class="modal-dialog modal-lg">
    <div class="modal-content"><form id="formDemo">
      <div class="modal-header"><h5 class="modal-title">Demo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="demo_id">
        <div class="row g-2 mb-3">
          <div class="col-md-5"><label class="form-label">Nombre *</label><input class="form-control" id="demo_nombre" required></div>
          <div class="col-md-7"><label class="form-label">Descripción</label><input class="form-control" id="demo_desc"></div>
        </div>
        <h6>Pasos</h6>
        <table class="table table-sm" id="tblPasos">
          <thead class="table-light"><tr><th>#</th><th>Movimiento</th><th>Duración (ms)</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <button type="button" class="btn btn-sm btn-outline-success" id="btnAddPaso"><i class="bi bi-plus"></i> Agregar paso</button>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form></div></div></div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/demos.js"></script>
</body>
</html>
